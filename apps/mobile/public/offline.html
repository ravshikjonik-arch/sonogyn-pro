<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#005CB9" />
    <title>Нет сети · Помощник АГ и УЗИ</title>
    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #f8fbff;
        color: #0f172a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 360px;
        background: #fff;
        border-radius: 20px;
        padding: 28px 22px;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
        border: 1px solid #e2e8f0;
      }
      h1 {
        font-size: 1.15rem;
        margin: 0 0 10px;
      }
      p {
        margin: 0 0 20px;
        line-height: 1.5;
        color: #475569;
        font-size: 0.95rem;
      }
      a {
        display: inline-block;
        background: #005cb9;
        color: #fff;
        text-decoration: none;
        font-weight: 800;
        padding: 14px 22px;
        border-radius: 999px;
        min-height: 48px;
        line-height: 20px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Связь временно недоступна</h1>
      <p>Проверьте интернет. Ранее открытые экраны могут быть доступны из кэша после следующего успешного визита.</p>
      <a href="/app">Повторить</a>
    </div>
  </body>
</html>
